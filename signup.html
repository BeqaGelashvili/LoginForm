<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="css/Main.css" />
</head>
<body>
  <main class="auth-page login signup">
    <form id="signupForm" class="login-card">
      <h2>Create your account</h2>

      <div class="form-group">
        <label for="signupName">Full Name</label>
        <input type="text" id="signupName" name="name" placeholder="John Doe" autocomplete="name" required />
        <span class="error-message" id="nameError"></span>
      </div>

      <div class="form-group">
        <label for="signupEmail">Email Address</label>
        <input type="email" id="signupEmail" name="email" placeholder="you@example.com" autocomplete="email" required />
        <span class="error-message" id="signupEmailError"></span>
      </div>

      <div class="form-group">
        <label for="signupPassword">Password</label>
        <div class="password-wrapper">
          <input type="password" id="signupPassword" name="password" placeholder="At least 8 characters" autocomplete="new-password" required />
          <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
            👁️
          </button>
        </div>
        <span class="error-message" id="signupPasswordError"></span>
      </div>

      <button type="submit" class="btn-primary">Sign up</button>

      <div class="secondary-link">
        Already have an account? <a href="index.html">Login</a>
      </div>
    </form>
  </main>

  <script type="module" src="JS/signup.js"></script>
</body>
</html>
